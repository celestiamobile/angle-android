name: Build Template

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      arch:
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config python3 python3-setuptools \
            curl git lsb-release ca-certificates \
            libglib2.0-dev libnss3-dev libdrm-dev libgbm-dev \
            libxkbcommon-dev libxshmfence-dev \
            openjdk-17-jdk-headless

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh ${{ inputs.platform }} ${{ inputs.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.platform }}.${{ inputs.arch }}
          path: angle-${{ inputs.arch }}.tar.gz
          retention-days: 30
