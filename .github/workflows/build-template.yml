name: Build Template

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      arch:
        required: true
        type: string
      ndk_version:
        description: 'NDK r-version (e.g. r27c). Empty = use Chromium-bundled NDK.'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config python3 python3-setuptools \
            curl git lsb-release ca-certificates \
            libglib2.0-dev libnss3-dev libdrm-dev libgbm-dev \
            libxkbcommon-dev libxshmfence-dev \
            openjdk-17-jdk-headless

      - name: Install NDK ${{ inputs.ndk_version }}
        id: setup_ndk
        if: inputs.ndk_version != ''
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ inputs.ndk_version }}
          add-to-path: false

      - name: Build
        env:
          ANGLE_NDK_ROOT: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          chmod +x build.sh
          ./build.sh ${{ inputs.platform }} ${{ inputs.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.platform }}.${{ inputs.arch }}
          path: angle-${{ inputs.arch }}.tar.gz
          retention-days: 30
